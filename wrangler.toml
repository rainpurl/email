name = "email-katres"
main = "worker.js"
compatibility_date = "2025-06-01"

# Ledger storage.
# Create it once with:  wrangler kv namespace create EMAILS
# then paste the returned id below.
[[kv_namespaces]]
binding = "EMAILS"
id = "PASTE_KV_NAMESPACE_ID_HERE"

# Serve the Worker at email.katr.es.
# katr.es is already on Cloudflare, so a custom domain works directly.
# Either uncomment the block below, or add the domain in the dashboard:
# Workers & Pages > email-katres > Settings > Domains & Routes > Add > Custom domain.
# [[routes]]
# pattern = "email.katr.es"
# custom_domain = true

# RESEND_API_KEY and (optional) SITE_PASSWORD are set as secrets, not here:
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put SITE_PASSWORD   (optional; defaults to "rain")
